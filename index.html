  <body>
    <div id="app">
      <main class="chat-app">
        <section class="hero-card" id="heroCard">
          <p class="eyebrow">Hi, there!</p>
          <h1>How can I help you today?</h1>
          <div class="status-row">
            <span id="status" class="status">Initializing…</span>
          </div>
        </section>

        <section id="chatWindow" class="chat-window" aria-live="polite"></section>

        <section class="input-card">
          <div id="imagePreviewWrap" class="image-preview-wrap hidden">
            <img id="imagePreview" class="image-preview" alt="Attached image" />
            <button type="button" id="removeImage" class="remove-image" aria-label="Remove image">✕</button>
          </div>
          <form id="chatForm" class="input-row">
            <textarea id="promptInput" class="prompt-input" rows="1" placeholder="Write a message…" required></textarea>
            <div class="input-actions">
              <button type="button" class="icon-button" id="imageButton" aria-label="Attach image" data-tooltip="Attach image">
                <svg width="18" height="18"><use href="#icon-image"/></svg>
              </button>
              <input type="file" id="imageInput" accept="image/png,image/jpeg,image/webp" style="display:none" />
              <button type="button" class="icon-button" aria-label="Voice input" data-tooltip="Voice input">
                <svg width="18" height="18"><use href="#icon-mic"/></svg>
              </button>
              <button type="submit" id="sendButton" class="send-button" aria-label="Send message" data-tooltip="Send">
                <svg width="18" height="18"><use href="#icon-send"/></svg>
              </button>
            </div>
          </form>
          <div class="footer-row">
            <a class="github-link" href="https://github.com/RahulDas-dev/ondevice-llm.git" target="_blank" rel="noopener" aria-label="View source on GitHub" data-tooltip="View source">
              <svg width="16" height="16"><use href="#icon-github"/></svg>
            </a>
            <p class="disclaimer">AI can make mistakes. Please double-check responses.</p>
          </div>
        </section>
      </main>
    </div>
